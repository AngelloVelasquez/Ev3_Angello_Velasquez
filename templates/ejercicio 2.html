<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 2 - Nombres</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}">
</head>
<body>
    <div class="container">
        <h2>Formulario de Nombres</h2>
        <form action="/ejercicio2" method="POST">
            Nombre 1: <input type="text" name="nombre1" required><br><br>
            Nombre 2: <input type="text" name="nombre2" required><br><br>
            Nombre 3: <input type="text" name="nombre3" required><br><br>
            <input type="submit" value="Enviar" class="btn-primary">
        </form>

        {% if mayor %}
            <br>
            <div class="resultado">
                <p>El nombre con mayor cantidad de caracteres es : {{ mayor }}</p>
                <p>El nombre tiene : {{ largo }} caracteres</p>
            </div>
        {% endif %}

        <br>
        <a href="/">Volver al Menú</a>
    </div>
</body>
</html>
