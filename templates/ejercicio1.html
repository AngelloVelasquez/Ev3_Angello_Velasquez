<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 1 - Descuento compra pintura</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}">
</head>
<body>
    <div class="container">
        <h2>Calculo de compras</h2>
        <form action="/ejercicio1" method="POST">
            <label>Ingresa tu nombre:</label>
            <input type="text" name="nombre" required><br><br>

            <label>Ingresa tu edad:</label>
            <input type="number" name="edad" required><br><br>

            <label>Ingresa la cantidad de tarros de pintura a comprar:</label>
            <input type="number" name="cantidadpinturas" required><br><br>

            <input type="submit" value="Calcular" class="btn-primary">
        </form>

        {% if nombre %}
            <div style ="margin-top:20px; text-align: left;">
                <p>Nombre del cliente: ${{ nombre }}</p>
                <p>Total sin descuento: ${{ totalcomprapinturas | int }}</p>
                <p>El descuento es: ${{ totaldscto | int }}</p>
                <p>Total a pagar es de: ${{ totalcomprafinal | int }}</p>
            </div>
        {% endif %}

        <br>
        <a href="/">Volver al Menú</a>
    </div>
</body>
</html>
