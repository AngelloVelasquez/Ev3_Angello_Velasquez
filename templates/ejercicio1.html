<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 1 - Notas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}">
</head>
<body>
    <div class="container">
        <h2>Formulario de Notas</h2>
        <form action="/ejercicio1" method="POST">
            <label>Nota 1:</label>
            <input type="number" name="nota1" min="10" max="70" required><br><br>

            <label>Nota 2:</label>
            <input type="number" name="nota2" min="10" max="70" required><br><br>

            <label>Nota 3:</label>
            <input type="number" name="nota3" min="10" max="70" required><br><br>

            <label>Asistencia (%):</label>
            <input type="number" name="asistencia" min="0" max="100" required><br><br>

            <input type="submit" value="Enviar" class="btn-primary">
        </form>

        {% if prom %}
            <div class="resultado">
                <p>Promedio: {{ prom }}</p>
                <p>Estado: <strong>{{ estado }}</strong></p>
            </div>
        {% endif %}

        <br>
        <a href="/">Volver al Menú</a>
    </div>
</body>
</html>
