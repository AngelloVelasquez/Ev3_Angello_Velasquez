<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Notas</title>
    <link rel="stylesheet" href="/static/css/estilos.css">
</head>
<body>
    <div class="container">
        <h2>Formulario de Notas</h2>
        <form action="/ejercicio1" method="POST">
            Nota 1: <input type="number" name="nota1" min="10" max="70" required><br><br>
            Nota 2: <input type="number" name="nota2" min="10" max="70" required><br><br>
            Nota 3: <input type="number" name="nota3" min="10" max="70" required><br><br>
            Asistencia (%): <input type="number" name="asistencia" min="0" max="100" required><br><br>
            <input type="submit" value="Enviar" class="btn-primary">
        </form>

        {% if prom %}
            <br>
            <p>{{ prom }}</p>
            <p><strong>{{ estado }}</strong></p>
        {% endif %}

        <br>
        <a href="/">Volver al Menú</a>
    </div>
</body>
</html>
